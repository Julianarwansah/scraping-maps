<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Google Maps Scraper</title>
  <script src="xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f0f2f5; --card-bg: #fff; --text: #333; --text-secondary: #666;
      --text-muted: #888; --border: #e0e0e0; --hover: #f8f9fa; --hover2: #e8eaed;
      --accent: #1a73e8; --accent-dark: #0d47a1; --success: #34a853;
      --danger: #d93025; --warning: #e67700; --shadow: rgba(0,0,0,.08);
      --shadow-sm: rgba(0,0,0,.06);
    }
    [data-theme="dark"] {
      --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0; --text-secondary: #b0b0b0;
      --text-muted: #888; --border: #2a2a4a; --hover: #1f2b47; --hover2: #253352;
      --accent: #4dabf7; --accent-dark: #1a73e8; --success: #51cf66;
      --danger: #ff6b6b; --warning: #fcc419; --shadow: rgba(0,0,0,.3);
      --shadow-sm: rgba(0,0,0,.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg); color: var(--text); transition: background .3s, color .3s;
    }

    .header { text-align: center; margin-bottom: 16px; position: relative; }
    .header h1 { font-size: 18px; color: var(--accent); }
    .header p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .theme-toggle {
      position: absolute; top: 0; right: 0; background: none; border: none;
      font-size: 18px; cursor: pointer; padding: 4px; opacity: .6; transition: opacity .2s;
    }
    .theme-toggle:hover { opacity: 1; }

    .card {
      background: var(--card-bg); border-radius: 10px; padding: 14px;
      box-shadow: 0 2px 8px var(--shadow); margin-bottom: 12px;
      transition: background .3s, box-shadow .3s;
    }

    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }

    textarea {
      width: 100%; padding: 10px 14px; resize: vertical; min-height: 60px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: inherit; transition: border-color .2s, background .3s, color .3s;
      background: var(--card-bg); color: var(--text);
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    .query-count { font-size: 10px; color: var(--text-muted); margin-top: 4px; text-align: right; }

    .format-card { padding: 10px 14px; }
    .format-options { display: flex; gap: 16px; }
    .format-opt { font-size: 12px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .format-opt input { accent-color: var(--accent); }

    .settings-row { display: flex; gap: 16px; }
    .settings-col { flex: 1; }
    .speed-select {
      width: 100%; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 12px; background: var(--card-bg);
      color: var(--text); cursor: pointer;
    }

    .history-list { max-height: 200px; overflow-y: auto; margin-top: 8px; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-radius: 6px; margin-bottom: 4px;
      background: var(--hover); font-size: 11px; gap: 8px;
    }
    .history-item:hover { background: var(--hover2); }
    .history-info { flex: 1; min-width: 0; }
    .history-query { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
    .history-export {
      padding: 4px 10px; border: none; border-radius: 4px;
      background: var(--accent); color: #fff; font-size: 10px; cursor: pointer;
      white-space: nowrap;
    }
    .history-export:hover { background: var(--accent-dark); }
    .clear-history-btn {
      width: 100%; margin-top: 8px; padding: 6px;
      background: none; border: 1px solid var(--border); border-radius: 6px;
      font-size: 11px; color: var(--text-muted); cursor: pointer;
    }
    .clear-history-btn:hover { border-color: var(--danger); color: var(--danger); }

    button#scrapeButton {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: transform .1s, opacity .2s;
    }
    button#scrapeButton:hover { opacity: .92; }
    button#scrapeButton:active { transform: scale(.98); }
    button#scrapeButton:disabled { opacity: .45; cursor: not-allowed; }

    #status {
      margin-top: 12px; font-size: 12px; min-height: 20px;
      text-align: center; padding: 10px; border-radius: 6px;
      background: var(--card-bg); box-shadow: 0 1px 4px var(--shadow-sm);
      line-height: 1.5; transition: background .3s;
    }

    .info { margin-top: 12px; }
    .info summary { font-size: 11px; font-weight: 600; color: var(--text-secondary); cursor: pointer; padding: 4px 0; }

    .column-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 2px 12px; margin-top: 8px;
    }
    .col-opt {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-secondary); padding: 2px 0; cursor: pointer;
    }
    .col-opt input { accent-color: var(--accent); width: 14px; height: 14px; }
    .col-actions { display: flex; gap: 8px; margin-top: 8px; }
    .col-action-btn {
      flex: 1; padding: 4px; border: 1px solid var(--border); border-radius: 4px;
      background: var(--card-bg); font-size: 10px; color: var(--text-secondary); cursor: pointer;
    }
    .col-action-btn:hover { background: var(--hover); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Google Maps Scraper</h1>
    <p>Scrape data bisnis lengkap dari Google Maps</p>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
  </div>

  <div class="card">
    <label for="searchQuery">Keyword Pencarian</label>
    <textarea id="searchQuery" rows="3" placeholder="Satu keyword per baris, contoh:&#10;restaurant Jakarta Selatan&#10;cafe Bandung&#10;hotel Bali"></textarea>
    <div class="query-count" id="queryCount"></div>
  </div>

  <div class="card format-card">
    <div class="settings-row">
      <div class="settings-col">
        <label>Format Export</label>
        <div class="format-options">
          <label class="format-opt">
            <input type="radio" name="exportFormat" value="xlsx" checked> Excel
          </label>
          <label class="format-opt">
            <input type="radio" name="exportFormat" value="csv"> CSV
          </label>
        </div>
      </div>
      <div class="settings-col">
        <label>Kecepatan</label>
        <select id="speedSelect" class="speed-select">
          <option value="slow">🐢 Lambat</option>
          <option value="normal" selected>🚶 Normal</option>
          <option value="fast">🏃 Cepat</option>
          <option value="aggressive">⚡ Agresif</option>
        </select>
      </div>
    </div>
  </div>

  <button id="scrapeButton">🔍 Scrape Data</button>

  <div id="status"></div>

  <details class="info card">
    <summary>📋 Kolom Export (klik untuk atur)</summary>
    <div id="columnSelector" class="column-grid"></div>
    <div class="col-actions">
      <button id="selectAllCols" class="col-action-btn">Pilih Semua</button>
      <button id="deselectAllCols" class="col-action-btn">Batal Semua</button>
    </div>
  </details>

  <details class="info card" id="historyPanel">
    <summary>📋 Riwayat Scrape (<span id="historyCount">0</span>)</summary>
    <div id="historyList" class="history-list"></div>
    <button id="clearHistoryBtn" class="clear-history-btn">🗑️ Hapus Semua Riwayat</button>
  </details>

  <script src="popup.js"></script>
</body>
</html>
